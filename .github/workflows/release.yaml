name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew jpackage

      - name: Package Linux Build
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/jpackage
          tar -czf ../../MySwingApp-linux-${{ github.ref_name }}.tar.gz MySwingApp/

      - name: Package Windows Build
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd build/jpackage
          7z a ../../MySwingApp-windows-${{ github.ref_name }}.zip MySwingApp/

      - name: Upload Artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            MySwingApp-linux-${{ github.ref_name }}.tar.gz
            MySwingApp-windows-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
